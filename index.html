<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>CURD Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="https://thumbs.dreamstime.com/b/people-fill-out-form-online-application-women-female-flat-cartoon-character-graphic-design-landing-page-banner-flyer-poster-man-138742742.jpg?w=768" height="200" alt="">
         <h1>Student Application</h1>
    </header>
    <form class="contrat">
        <label for="Name">Name:</label>
        <input type="text" id="name"  placeholder="Enter Name">
        <br>
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Enter Email">
        <br>
         <button onclick="addStudent()">Add</button>
    <br>
    </form>
    
   
<h3>Student List</h3>
<ul id="list"></ul>


<script>

async function addStudent(){

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;

await fetch("/add",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,email})
})

loadStudents();
}


async function loadStudents(){

let res = await fetch("/students");
let data = await res.json();

let list = document.getElementById("list");
list.innerHTML="";

data.forEach(student=>{

list.innerHTML += `
<li>
${student.name} - ${student.email}
<button onclick="deleteStudent('${student._id}')">Delete</button>
</li>
`;

});
}


async function deleteStudent(id){

await fetch("/delete/"+id,{
method:"DELETE"
})

loadStudents();
}

loadStudents();

</script>
    
</body>
</html>
